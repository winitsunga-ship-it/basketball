<!doctype html>
<html class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Arcade Basketball</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playball&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    .arcade-font { font-family: 'Press Start 2P', monospace; }
    .cursive-text { font-family: 'Playball', cursive; }
    
    /* Ensuring balls look like balls again */
    .ball { 
        width: 40px; height: 40px; 
        background: radial-gradient(circle at 30% 30%, #ff9ecf, #ff1493); 
        border-radius: 50%; border: 2px solid #cc0066;
        cursor: pointer;
    }
    
    .booth-container {
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: top left;
    }
    .booth-zoomed { transform: scale(3.2) translate(35px, 20px); }
    
    @keyframes rollDown { 0% { transform: translateY(-100%); } 100% { transform: translateY(0); } }
  </style>
</head>
<body class="h-full flex items-center justify-center bg-slate-900 arcade-font">

  <div id="booth" class="booth-container relative w-[380px] h-[580px] bg-blue-950 border-[6px] border-blue-900 rounded-lg overflow-hidden">
    <!-- Header -->
    <div class="h-14 flex items-center justify-center bg-pink-600 border-b-4 border-blue-900 text-white text-xs">ARCADE HOOPS</div>
    
    <!-- Score -->
    <div class="mt-4 mx-auto w-32 bg-black border-2 border-blue-900 p-2 text-center">
        <span class="text-green-400 text-[10px]">SCORE: <span id="score">0</span>/3</span>
    </div>

    <!-- Hoop area -->
    <div class="mt-8 flex justify-center">
        <div class="w-20 h-12 border-4 border-white"></div>
    </div>

    <!-- Balls -->
    <div id="ball-area" class="absolute bottom-10 flex justify-around w-full px-10">
      <div class="ball" onclick="shoot(this)"></div>
      <div class="ball" onclick="shoot(this)"></div>
      <div class="ball" onclick="shoot(this)"></div>
    </div>
  </div>

  <script>
    let score = 0;
    function shoot(el) {
      if(el.style.visibility === 'hidden') return;
      el.style.visibility = 'hidden';
      score++;
      document.getElementById('score').textContent = score;
      if(score === 3) {
        document.getElementById('booth').classList.add('booth-zoomed');
        setTimeout(() => alert("Victory!"), 1500);
      }
    }
  </script>
</body>
</html>
