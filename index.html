<!doctype html>
<html class="h-full">
 <head>
  <script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Arcade Basketball</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    * { font-family: 'Press Start 2P', monospace; }
    
    .booth-container {
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: top left;
    }
    .booth-zoomed {
      transform: scale(3.2) translate(35px, 20px);
    }
    
    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -10px;
      animation: confettiFall 2.5s linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
    }
    
    @keyframes rollDown {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(0); }
    }
    
    .ball {
      cursor: grab;
      transition: transform 0.1s;
    }
    .ball:active { cursor: grabbing; }
    
    .aim-line {
      pointer-events: none;
      stroke-dasharray: 6 4;
    }
    
    .pixel-border {
      box-shadow: 
        4px 0 0 0 #1e3a5f,
        -4px 0 0 0 #1e3a5f,
        0 4px 0 0 #1e3a5f,
        0 -4px 0 0 #1e3a5f;
    }

    .net-swish {
      animation: netSwish 0.4s ease-in-out;
    }
    @keyframes netSwish {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(1.3); }
      100% { transform: scaleY(1); }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gray-900 flex items-center justify-center overflow-hidden">
  <div id="game-wrapper" class="relative w-full h-full flex items-center justify-center">
   <div id="confetti-container" class="absolute inset-0 pointer-events-none z-50"></div>
