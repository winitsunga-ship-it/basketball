<!doctype html>
<html class="h-full">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Arcade Basketball</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    * { font-family: 'Press Start 2P', monospace; }

    .booth-container {
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: top left;
    }

    /* UPDATED: zoom now visually favors left-side chute */
    .booth-zoomed {
      transform: scale(3.2) translate(60px, 30px);
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -10px;
      animation: confettiFall 2.5s linear forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
    }

    .ticket-strip{
      width:60px;
      background:#fff3b0;
      border:1px dashed #b8860b;
      transform-origin:top;
      animation:printDown 2s forwards;
    }

    @keyframes printDown{
      from{ height:0; }
      to{ height:180px; }
    }

    .ball {
      cursor: pointer;
      transition: transform 0.1s;
      z-index: 10;
      position: absolute;
    }

    .ball-flying {
      animation: arcToRing 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards !important;
    }

    @keyframes arcToRing {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      50% { transform: translate(-30px, -80px) scale(1); }
      100% { transform: translate(-30px, -130px) scale(0.3); opacity: 0; }
    }

    .net-swish {
      animation: netSwish 0.4s ease-in-out;
    }

    @keyframes netSwish {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(1.3); }
      100% { transform: scaleY(1); }
    }

    .pixel-border {
      box-shadow:
        4px 0 0 0 #1e3a5f,
        -4px 0 0 0 #1e3a5f,
        0 4px 0 0 #1e3a5f,
        0 -4px 0 0 #1e3a5f;
    }
  </style>
 </head>

 <body class="h-full bg-gray-900 flex items-center justify-center overflow-hidden">

  <div id="game-wrapper" class="relative w-full h-full flex items-center justify-center">

   <div id="confetti-container" class="absolute inset-0 pointer-events-none z-50"></div>

   <!-- BOOTH -->
   <div id="booth" class="booth-container relative" style="width: 380px; height: 580px;">
    <div class="absolute inset-0 rounded-lg"
      style="background: linear-gradient(180deg, #0a2a4a 0%, #0d3b6b 40%, #1a4f8a 100%);
      border: 6px solid #1e3a5f;">

      <!-- TOP MARQUEE -->
      <div class="absolute top-0 left-0 right-0 h-14 flex items-center justify-center"
        style="background: linear-gradient(180deg, #ff69b4, #ff1493);
        border-bottom: 4px solid #1e3a5f;">
        <span id="title-text" class="text-white text-xs tracking-wide">
          ARCADE HOOPS
        </span>
      </div>

      <!-- SCORE -->
      <div class="absolute top-16 left-1/2 -translate-x-1/2 bg-black px-4 py-2 pixel-border">
        <span class="text-green-400 text-xs">
          SCORE: <span id="score">0</span>/3
        </span>
      </div>

      <!-- HOOP -->
      <div class="absolute" style="top: 90px; left: 50%; transform: translateX(-50%);">
        <div style="width:100px;height:70px;background:rgba(255,255,255,0.15);
        border:3px solid #fff; position:relative;">

          <div id="net"
            style="position:absolute; bottom:-8px; left:50%;
            transform:translateX(-50%);
            width:60px; height:8px;
            background:#ff4500;">
          </div>

        </div>
      </div>

      <!-- SIDE LIGHTS -->
      <div class="absolute left-2 top-20 flex flex-col gap-3">
        <div class="w-3 h-3 rounded-full bg-yellow-300 animate-pulse"></div>
        <div class="w-3 h-3 rounded-full bg-pink-400 animate-pulse"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-300 animate-pulse"></div>
      </div>

      <div class="absolute right-2 top-20 flex flex-col gap-3">
        <div class="w-3 h-3 rounded-full bg-yellow-300 animate-pulse"></div>
        <div class="w-3 h-3 rounded-full bg-pink-400 animate-pulse"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-300 animate-pulse"></div>
      </div>

      <!-- BALL AREA -->
      <div id="ball-area"
        class="absolute"
        style="bottom: 140px; left: 0; right: 0; height: 160px; z-index: 10;">

        <div id="ball-0" class="ball rounded-full"
          style="width:36px;height:36px;left:60px;bottom:20px;
          background: radial-gradient(circle at 30% 30%, #ff9ecf, #ff1493);
          border: 2px solid #cc0066;">
        </div>

        <div id="ball-1" class="ball rounded-full"
          style="width:36px;height:36px;left:160px;bottom:20px;
          background: radial-gradient(circle at 30% 30%, #ff9ecf, #ff1493);
          border: 2px solid #cc0066;">
        </div>

        <div id="ball-2" class="ball rounded-full"
          style="width:36px;height:36px;left:270px;bottom:20px;
          background: radial-gradient(circle at 30% 30%, #ff9ecf, #ff1493);
          border: 2px solid #cc0066;">
        </div>

      </div>

      <!-- TICKET CHUTE (NOW LEFT SIDE) -->
      <div id="ticket-chute-area"
        style="position:absolute; bottom:10px; left:18px; width:80px; z-index:5;">

        <div id="ticket-chute"
          style="width:70px;height:20px;background:#000;border:3px solid #333;">
          <span class="absolute -top-6 left-0 text-green-300" style="font-size:5px;">
            TICKETS
          </span>
        </div>

        <div id="ticket-output"
          style="width:70px;min-height:120px;margin-top:8px;">
        </div>

      </div>

    </div>
   </div>

   <!-- INSTRUCTIONS -->
   <div id="instructions"
    class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black bg-opacity-80 px-4 py-2 rounded">
    <p class="text-pink-300 text-xs">CLICK A BALL TO SHOOT!</p>
   </div>

  </div>

<script>
let score = 0;
let ballsShot = 0;
const booth = document.getElementById("booth");

/* CLICK TO SHOOT */
document.querySelectorAll(".ball").forEach(ball => {
  ball.addEventListener("click", () => {
    if (ball.dataset.shot === "true") return;
    shootBall(ball);
  });
});

function shootBall(ball) {
  ball.dataset.shot = "true";
  ball.classList.add("ball-flying");

  setTimeout(() => {
    const madeShot = Math.random() > 0.2;

    if (madeShot) {
      score++;
      document.getElementById("score").textContent = score;

      const net = document.getElementById("net");
      net.classList.add("net-swish");
      setTimeout(() => net.classList.remove("net-swish"), 400);
    }

    ball.style.opacity = "0";
    ballsShot++;

    checkGameEnd();
  }, 800);
}

function checkGameEnd() {
  if (ballsShot < 3) return;

  if (score === 3) {
    launchConfetti();
    setTimeout(zoomToChute, 1500);
  } else {
    document.getElementById("instructions").innerHTML =
      '<p class="text-pink-300 text-xs">TRY AGAIN - REFRESH PAGE</p>';
  }
}

function launchConfetti() {
  const container = document.getElementById("confetti-container");
  const colors = ['#ff1493','#00bfff','#ffd700','#00ff88','#ff6b6b','#a855f7'];

  for (let i = 0; i < 80; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random() * 100 + "%";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    container.appendChild(piece);
  }
}

function zoomToChute() {
  document.getElementById("instructions").style.display = "none";
  booth.classList.add("booth-zoomed");
}
</script>

 </body>
</html>
