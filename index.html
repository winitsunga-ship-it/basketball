<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Arcade Basketball</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050913;
    overflow:hidden;
    font-family:monospace;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
    transition:transform 3s ease;
}

/* Background */

.arcade-bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at center,#14284e 0%,#09101f 60%,#03060c 100%);
}

/* Booth */

.booth{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:500px;
    height:700px;
}

.frame{
    position:absolute;
    inset:0;
    border:10px solid #35a8ff;
    box-shadow:
    0 0 20px #35a8ff,
    0 0 50px #35a8ff,
    inset 0 0 30px #35a8ff;
}

.tunnel{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:40px;
    width:360px;
    height:400px;
}

.ring{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    border:6px solid #4cc3ff;
    height:50px;
}

.ring:nth-child(1){top:0;}
.ring:nth-child(2){top:50px;width:92%;}
.ring:nth-child(3){top:100px;width:84%;}
.ring:nth-child(4){top:150px;width:76%;}
.ring:nth-child(5){top:200px;width:68%;}
.ring:nth-child(6){top:250px;width:60%;}

.scoreboard{
    position:absolute;
    top:460px;
    left:50%;
    transform:translateX(-50%);
    width:260px;
    height:120px;
    border:6px solid #35a8ff;
    background:#08111f;
    box-shadow:0 0 20px #35a8ff;
}

.score-title{
    text-align:center;
    color:#fff;
    margin-top:10px;
    font-size:20px;
}

#score{
    text-align:center;
    color:#ff5db8;
    font-size:52px;
    margin-top:5px;
}

.hoop{
    position:absolute;
    top:290px;
    left:50%;
    transform:translateX(-50%);
    width:100px;
    height:14px;
    background:#35a8ff;
    box-shadow:0 0 15px #35a8ff;
    border-radius:4px;
}

.net{
    position:absolute;
    top:304px;
    left:50%;
    transform:translateX(-50%);
    width:70px;
    height:70px;
    border-left:3px solid white;
    border-right:3px solid white;
    border-bottom:3px solid white;
}

/* Ticket Chute */

.ticket-chute{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    width:140px;
    height:35px;
    background:#111;
    border:4px solid #999;
}

.ticket{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:65px;
    width:90px;
    height:0;
    background:
    repeating-linear-gradient(
        to bottom,
        #fff,
        #fff 12px,
        #ddd 12px,
        #ddd 24px
    );
    overflow:hidden;
}

.ticket.show{
    animation:ticketRoll 3s forwards;
}

@keyframes ticketRoll{
    from{
        height:0;
    }
    to{
        height:260px;
    }
}

/* Balls */

.ball{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:50%;
    background:#ff4fa8;
    box-shadow:
    0 0 10px #ff4fa8,
    inset -5px -5px 0 rgba(0,0,0,.2);
    cursor:pointer;
}

.ball::before{
    content:'';
    position:absolute;
    left:22px;
    top:0;
    width:4px;
    height:50px;
    background:#8c0049;
}

.ball::after{
    content:'';
    position:absolute;
    left:0;
    top:22px;
    width:50px;
    height:4px;
    background:#8c0049;
}

/* HUD */

.instructions{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    font-size:20px;
    text-shadow:0 0 10px #35a8ff;
}

/* Jackpot */

#jackpot{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    font-size:80px;
    text-shadow:
    0 0 15px #ff4fa8,
    0 0 30px #35a8ff;
    opacity:0;
    pointer-events:none;
}

#jackpot.show{
    animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
    }
}

/* Confetti */

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(1080deg);
    }
}
</style>
</head>

<body>

<div id="game">

<div class="arcade-bg"></div>

<div class="instructions">
    CLICK THE PINK BALLS TO SHOOT • SCORE ALL 3
</div>

<div class="booth">

    <div class="frame"></div>

    <div class="tunnel">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <div class="hoop"></div>
    <div class="net"></div>

    <div class="scoreboard">
        <div class="score-title">SCORE</div>
        <div id="score">0</div>
    </div>

    <div class="ticket"></div>
    <div class="ticket-chute"></div>

</div>

<div id="jackpot">
    🎉 JACKPOT 🎉
    <div style="font-size:40px;">
        +500 TICKETS
    </div>
</div>

</div>

<script>

const game = document.getElementById("game");
const scoreText = document.getElementById("score");
const jackpot = document.getElementById("jackpot");
const ticket = document.querySelector(".ticket");

let score = 0;

const startX = window.innerWidth/2 - 90;
const startY = window.innerHeight - 120;

for(let i=0;i<3;i++){

    const ball = document.createElement("div");
    ball.className = "ball";

    ball.style.left = (startX + i*70) + "px";
    ball.style.top = startY + "px";

    game.appendChild(ball);

    ball.addEventListener("click",()=>shootBall(ball));
}

function shootBall(ball){

    ball.style.pointerEvents="none";

    const hoopX = window.innerWidth/2;
    const hoopY = window.innerHeight/2 - 60;

    const startLeft = parseFloat(ball.style.left);
    const startTop = parseFloat(ball.style.top);

    let progress = 0;

    const anim = setInterval(()=>{

        progress += 0.03;

        const x =
        startLeft +
        (hoopX-startLeft)*progress;

        const y =
        startTop +
        (hoopY-startTop)*progress -
        Math.sin(progress*Math.PI)*200;

        ball.style.left = x+"px";
        ball.style.top = y+"px";

        if(progress>=1){

            clearInterval(anim);

            score++;
            scoreText.textContent = score;

            ball.remove();

            screenShake();

            if(score===3){
                jackpotSequence();
            }
        }

    },16);
}

function screenShake(){

    game.animate([
        {transform:'translateX(-10px)'},
        {transform:'translateX(10px)'},
        {transform:'translateX(0px)'}
    ],{
        duration:200
    });
}

function jackpotSequence(){

    createConfetti();

    setTimeout(()=>{

        game.style.transform =
        "scale(2.3) translateY(120px)";

    },500);

    setTimeout(()=>{

        ticket.classList.add("show");

    },2500);

    setTimeout(()=>{

        jackpot.classList.add("show");

    },4500);
}

function createConfetti(){

    const colors = [
        "#ff4fa8",
        "#35a8ff",
        "#ffffff",
        "#7d5cff"
    ];

    for(let i=0;i<250;i++){

        const c = document.createElement("div");

        c.className = "confetti";

        c.style.left =
        Math.random()*100 + "vw";

        c.style.background =
        colors[Math.floor(
        Math.random()*colors.length)];

        c.style.animationDuration =
        (3 + Math.random()*4) + "s";

        game.appendChild(c);

        setTimeout(()=>c.remove(),7000);
    }
}

</script>

</body>
</html>
