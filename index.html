<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cozy Arcade Hoops</title>
<style>
body{margin:0;background:linear-gradient(#232b4f,#12182d);overflow:hidden;font-family:monospace}
#scene{width:100vw;height:100vh;position:relative;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:white;opacity:.6}
#cabinet{
position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%);
width:720px;height:860px;
transition:transform 3s ease;
transform-origin:bottom left;
}
.machine{
position:absolute;inset:0;
background:#5878b8;
border:10px solid #f2a6c8;
border-radius:16px;
box-shadow:0 0 0 8px #415d96;
}
.scorebox{
position:absolute;top:20px;left:50%;transform:translateX(-50%);
width:240px;height:80px;background:#233252;color:#ffe9a8;
display:flex;align-items:center;justify-content:center;font-size:42px;border-radius:8px;
}
.tunnel{
position:absolute;left:110px;right:110px;top:120px;height:430px;
background:linear-gradient(to bottom,#31466f,#22314f);
clip-path:polygon(15% 0,85% 0,100% 100%,0 100%);
}
.hoop{position:absolute;top:220px;left:50%;transform:translateX(-50%);width:90px;height:10px;background:#f2a6c8}
.net{position:absolute;top:230px;left:50%;transform:translateX(-50%);width:60px;height:55px;border:3px dashed #fff}
.tray{
position:absolute;left:40px;right:40px;bottom:80px;height:120px;
background:#4767a4;border-radius:12px;
}
.ball{
position:absolute;width:50px;height:50px;border-radius:50%;
background:#f39ac7;bottom:30px;cursor:grab;
box-shadow:inset -6px -6px rgba(0,0,0,.15);
}
.ticket-slot{
position:absolute;
left:35px;
bottom:25px;
width:80px;height:18px;
background:#1a1a1a;border-radius:3px;
}
.ticket{
position:absolute;
left:35px;
bottom:43px;
width:90px;
height:0;
background:#fff7d9;
overflow:hidden;
color:#444;
font-size:12px;
padding-top:0;
}
.ticket.print{animation:printTicket 4s forwards}
@keyframes printTicket{
to{height:420px;padding-top:10px}
}
.confetti{
position:absolute;width:10px;height:10px;
animation:fall 4s linear forwards;
}
@keyframes fall{
to{transform:translateY(120vh) rotate(720deg)}
}
#msg{
position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
color:white;font-size:60px;opacity:0;transition:1s;pointer-events:none;
}
#msg.show{opacity:1}
.info{
position:absolute;top:20px;width:100%;text-align:center;color:white
}
</style>
</head>
<body>
<div id="scene">
<div class="info">Drag a pink ball upward and release. Score all 3.</div>
<div id="cabinet">
<div class="machine"></div>
<div class="scorebox"><span id="score">0</span>/3</div>
<div class="tunnel"></div>
<div class="hoop"></div>
<div class="net"></div>
<div class="tray">
<div class="ball" style="left:180px"></div>
<div class="ball" style="left:300px"></div>
<div class="ball" style="left:420px"></div>
</div>
<div class="ticket"></div>
<div class="ticket-slot"></div>
</div>
<div id="msg">🎟 500 TICKETS 🎟</div>
</div>
<script>
for(let i=0;i<120;i++){
 let s=document.createElement('div');
 s.className='star';
 s.style.left=Math.random()*100+'vw';
 s.style.top=Math.random()*100+'vh';
 document.body.appendChild(s);
}

let score=0;
const scoreEl=document.getElementById('score');
const cabinet=document.getElementById('cabinet');
const ticket=document.querySelector('.ticket');
const msg=document.getElementById('msg');

document.querySelectorAll('.ball').forEach(ball=>{
 let dragging=false,startX,startY;

 ball.addEventListener('pointerdown',e=>{
  dragging=true;
  startX=e.clientX;
  startY=e.clientY;
 });

 window.addEventListener('pointerup',e=>{
  if(!dragging)return;
  dragging=false;

  const dx=e.clientX-startX;
  const dy=startY-e.clientY;

  if(dy<40)return;

  shoot(ball,dx,dy);
 });
});

function shoot(ball,dx,dy){
 ball.style.pointerEvents='none';

 const startL=ball.offsetLeft+40;
 let p=0;

 const targetX=360+(dx*.2);
 const targetY=230;

 const anim=setInterval(()=>{
  p+=0.03;

  const x=startL+(targetX-startL)*p;
  const y=640-(p*350)-Math.sin(p*Math.PI)*150;

  ball.style.left=x+'px';
  ball.style.top=y+'px';
  ball.style.bottom='auto';

  if(p>=1){
   clearInterval(anim);

   const made=Math.abs(targetX-360)<90;

   if(made){
    score++;
    scoreEl.textContent=score;
   }

   ball.remove();

   if(score===3){
    winSequence();
   }
  }
 },16);
}

function winSequence(){

 const colors=['#f39ac7','#ffffff','#ffe9a8','#88aaff'];

 for(let i=0;i<250;i++){
  let c=document.createElement('div');
  c.className='confetti';
  c.style.left=Math.random()*100+'vw';
  c.style.top='-10px';
  c.style.background=colors[Math.floor(Math.random()*colors.length)];
  document.body.appendChild(c);
 }

 setTimeout(()=>{
   cabinet.style.transform='translate(-15%,-20%) scale(2.4)';
 },1000);

 setTimeout(()=>{
   ticket.classList.add('print');
   ticket.innerHTML='<center>500<br>TICKETS<br>★★★★★<br>JACKPOT</center>';
 },3500);

 setTimeout(()=>msg.classList.add('show'),6500);
}
</script>
</body>
</html>
