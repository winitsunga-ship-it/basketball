<!doctype html>
<html class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Arcade Basketball</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playball&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .arcade-font, .arcade-font * { font-family: 'Press Start 2P', monospace; }
    .cursive-text { font-family: 'Playball', cursive; text-shadow: 0 0 12px rgba(244, 114, 182, 0.4); }
    
    .booth-container {
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: top left;
      box-shadow: 0 25px 70px -10px rgba(0, 0, 0, 0.7);
    }
    .booth-zoomed { transform: scale(3.2) translate(35px, 20px); }
    
    .confetti-piece { position: absolute; width: 8px; height: 8px; top: -10px; animation: confettiFall 2.5s linear forwards; }
    @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(600px) rotate(720deg); opacity: 0; } }
    @keyframes rollDown { 0% { transform: translateY(-100%); } 100% { transform: translateY(0); } }
    .hide-scrollbar { overflow: hidden; }
    
    .ball { cursor: grab; transition: transform 0.1s, box-shadow 0.2s; }
    .ball:hover { box-shadow: 0 0 15px rgba(255, 20, 147, 0.6), inset -3px -3px 6px rgba(0,0,0,0.3); }
    
    .ball-0-flying { animation: arcBall0 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards !important; }
    @keyframes arcBall0 { 0% { transform: translate(0, 0); opacity: 1; } 50% { transform: translate(56px, -320px) scale(0.7); } 100% { transform: translate(112px, -275px) scale(0.4); opacity: 0; } }
    .ball-1-flying { animation: arcBall1 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards !important; }
    @keyframes arcBall1 { 0% { transform: translate(0, 0); opacity: 1; } 50% { transform: translate(6px, -320px) scale(0.7); } 100% { transform: translate(12px, -275px) scale(0.4); opacity: 0; } }
    .ball-2-flying { animation: arcBall2 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards !important; }
    @keyframes arcBall2 { 0% { transform: translate(0, 0); opacity: 1; } 50% { transform: translate(-49px, -320px) scale(0.7); } 100% { transform: translate(-98px, -275px) scale(0.4); opacity: 0; } }

    .net-swish { animation: netSwish 0.4s ease-in-out; }
    @keyframes netSwish { 0% { transform: scaleY(1); } 50% { transform: scaleY(1.3); } 100% { transform: scaleY(1); } }
    
    #love-note-container { opacity: 0; transition: opacity 1.5s ease-in-out; }
    .typewriter-cursor::after { content: '|'; animation: blink 0.8s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .chute-shadow-overlay { position: absolute; top: 15px; left: 0; width: 70px; height: 25px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); pointer-events: none; }
  </style>
 </head>
 <body class="h-full flex items-center justify-center overflow-hidden arcade-font" style="background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);">
  
  <audio id="audio-bg-game" src="game-music.mp3" loop></audio>
  <audio id="audio-bg-zoom" src="zoom-music.mp3" loop></audio>
  <audio id="audio-fx-shoot" src="shoot.mp3"></audio>
  <audio id="audio-fx-winner" src="winner.mp3"></audio>

  <div id="love-note-container" class="absolute left-[7%] top-[25%] w-[340px] z-50 p-6 rounded-2xl border border-pink-500/20 bg-slate-950/40 backdrop-blur-md">
    <div id="note-line1" class="cursive-text text-pink-300 text-3xl"></div>
    <div id="note-line2" class="cursive-text text-pink-400 text-2xl mt-5 pl-6"></div>
  </div>

  <div id="confetti-container" class="absolute inset-0 pointer-events-none z-50"></div>
  
  <div id="booth" class="booth-container relative" style="width: 380px; height: 580px;">
    <div class="absolute inset-0 rounded-lg" style="background: linear-gradient(180deg, #0a2a4a 0%, #0d3b6b 40%, #1a4f8a 100%); border: 6px solid #1e3a5f;">
     <div class="absolute top-0 left-0 right-0 h-14 flex items-center justify-center" style="background: #ff1493;"><span class="text-white text-xs">ARCADE HOOPS</span></div>
     <div class="absolute top-16 left-1/2 -translate-x-1/2 bg-black px-4 py-2"><span class="text-green-400 text-xs">SCORE: <span id="score">0</span>/3</span></div>
     
     <div class="absolute" style="top: 90px; left: 50%; transform: translateX(-50%);">
      <div id="hoop" class="relative" style="width: 100px; height: 70px; border: 3px solid #fff;">
       <div id="net" class="absolute bottom-[-35px] left-1/2 -translate-x-1/2" style="width: 50px; height: 30px;">
        <svg width="50" height="30" viewBox="0 0 50 30"><path d="M5 0 L10 10 L5 20 L10 30" stroke="white" stroke-width="1.5" fill="none" opacity="0.7" /><path d="M15 0 L20 10 L15 20 L20 30" stroke="white" stroke-width="1.5" fill="none" opacity="0.7" /><path d="M25 0 L30 10 L25 20 L30 30" stroke="white" stroke-width="1.5" fill="none" opacity="0.7" /><path d="M35 0 L40 10 L35 20 L40 30" stroke="white" stroke-width="1.5" fill="none" opacity="0.7" /><path d="M45 0 L40 10 L45 20 L40 30" stroke="white" stroke-width="1.5" fill="none" opacity="0.7" /></svg>
       </div>
      </div>
     </div>
     
     <div id="ball-area" class="absolute z-30" style="bottom: 100px; left: 0; right: 0; height: 160px;">
      <div id="ball-0" class="ball absolute rounded-full" style="width: 36px; height: 36px; background: #ff1493; bottom: 20px; left: 60px;"></div>
      <div id="ball-1" class="ball absolute rounded-full" style="width: 36px; height: 36px; background: #ff1493; bottom: 20px; left: 160px;"></div>
      <div id="ball-2" class="ball absolute rounded-full" style="width: 36px; height: 36px; background: #ff1493; bottom: 20px; left: 270px;"></div>
     </div>
     
     <div id="ticket-chute-area" class="absolute z-10" style="top: 20px; left: 15px; width: 80px;">
      <div id="ticket-chute" style="width: 70px; height: 20px; background: #000; border: 3px solid #333;"></div>
      <div class="chute-shadow-overlay"></div>
      <div id="ticket-output" class="absolute hide-scrollbar" style="top: 15px; left: 0; width: 70px; height: 440px; z-index: 5;"></div>
     </div>
    </div>
  </div>

  <script>
    let score = 0, ballsShot = 0;
    const booth = document.getElementById('booth');

    window.addEventListener('click', () => {
      const bgMusic = document.getElementById('audio-bg-game');
      if (bgMusic.paused && ballsShot < 3) { bgMusic.volume = 0.5; bgMusic.play().catch(() => {}); }
    }, { once: true });

    document.querySelectorAll('.ball').forEach((ball, i) => {
      ball.addEventListener('click', () => {
        if (ball.dataset.shot === 'true') return;
        ball.dataset.shot = 'true';
        ball.classList.add(`ball-${i}-flying`);
        document.getElementById('audio-fx-shoot').play().catch(() => {});
        setTimeout(() => {
          score++;
          document.getElementById('score').textContent = score;
          document.getElementById('net').classList.add('net-swish');
          ball.style.opacity = '0';
          ballsShot++;
          if (ballsShot >= 3) {
            document.getElementById('audio-bg-game').pause();
            const winSound = document.getElementById('audio-fx-winner');
            winSound.play().catch(() => {});
            setTimeout(() => {
              launchConfetti();
              setTimeout(zoomToChute, 1500);
            }, 500);
          }
        }, 800);
      });
    });

    function launchConfetti() {
      const container = document.getElementById('confetti-container');
      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random() * 100 + '%';
        p.style.background = ['#ff1493', '#ffd700'][Math.floor(Math.random() * 2)];
        container.appendChild(p);
      }
    }

    function zoomToChute() {
      booth.classList.add('booth-zoomed');
      const z = document.getElementById('audio-bg-zoom');
      z.volume = 0; z.play().catch(() => {});
      let f = setInterval(() => { if (z.volume < 0.5) z.volume += 0.05; else clearInterval(f); }, 200);
      setTimeout(printTickets, 1800);
    }

    function printTickets() {
      const output = document.getElementById('ticket-output');
      const t = document.createElement('div');
      t.style.cssText = 'width:60px; height:100px; background:white; margin:auto; animation:rollDown 10s linear forwards;';
      output.appendChild(t);
      const n = document.getElementById('love-note-container');
      n.style.opacity = '1';
      document.getElementById('note-line1').textContent = "Happy 5th monthsary, Yayang!!";
      document.getElementById('note-line2').textContent = "-yours only, wywyn";
    }
  </script>
 </body>
</html>
